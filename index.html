      <div id="game-container">
        <script>
          document.addEventListener("keydown", function (event) {
              if (event.code === "Space") {
                  const gameContainer = document.getElementById("game-container");
      
                  // Check if the iframe is already loaded
                  if (!gameContainer.querySelector("iframe")) {
                      const iframe = document.createElement("iframe");
                      iframe.src = "game-files/game.html";
                      iframe.style.border = "none";
                      iframe.allow = "fullscreen";
                      iframe.loading = "lazy";
    
                       // Make the iframe full width and adjust height
                  iframe.style.width = "100%";  // Set width to 100% of the parent container
                  iframe.style.height = "100%"; // Set height to 100% of the parent container
                  //iframe.style.position = "absolute"; // Ensure it's positioned correctly
                  iframe.style.top = "0";  // Align the top of the iframe with the parent
                  iframe.style.left = "0"; // Align the left of the iframe with the parent
    
                      gameContainer.appendChild(iframe);
                  }
      
                  
                  // Make the game container visible
                  gameContainer.style.display = "block";
              }
          });
      </script></div>
